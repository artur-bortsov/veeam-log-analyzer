<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="stitle sdesc">
  <title id="stitle">Veeam Replication Log Analyzer</title>
  <desc id="sdesc">Turn replication logs into metrics you can chart. PowerShell CSV parser for Veeam Backup &amp; Replication.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1318"/>
      <stop offset="100%" stop-color="#0a3b27"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="52"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="220"  cy="180" rx="420" ry="280" fill="#4cd97b" fill-opacity="0.24" filter="url(#blur)"/>
  <ellipse cx="1060" cy="460" rx="420" ry="280" fill="#4dcde0" fill-opacity="0.18" filter="url(#blur)"/>
  <ellipse cx="680"  cy="80"  rx="320" ry="200" fill="#6ff3b3" fill-opacity="0.12" filter="url(#blur)"/>
  <line x1="40" y1="420" x2="1240" y2="420" stroke="#4cd97b" stroke-opacity="0.12" stroke-width="1"/>
  <g font-family="Arial, Apple Symbols, sans-serif" text-anchor="middle">
    <rect x="508" y="105" width="264" height="40" rx="20" fill="#0a1715" fill-opacity="0.62" stroke="#4cd97b" stroke-opacity="0.45"/>
    <text x="640" y="131" fill="#c3dcd1" font-size="18" font-weight="700">Veeam → Analytics</text>
    <text x="640" y="244" fill="#f4f8f6" font-size="64" font-weight="800">Veeam Log</text>
    <text x="640" y="322" fill="#f4f8f6" font-size="64" font-weight="800">Analyzer</text>
    <text x="640" y="386" fill="#c3dcd1" font-size="28">Turn replication logs into metrics you can chart.</text>
    <!-- Pills: total width 516 px, centred at x=640 -->
    <rect x="382" y="452" width="138" height="44" rx="22" fill="#0a1715" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="451"  y="480" fill="#f4f8f6" font-size="17" font-weight="700">PowerShell</text>
    <rect x="540" y="452" width="148" height="44" rx="22" fill="#0a1715" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="614"  y="480" fill="#f4f8f6" font-size="17" font-weight="700">Incremental</text>
    <rect x="708" y="452" width="190" height="44" rx="22" fill="#0a1715" fill-opacity="0.62" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="803"  y="480" fill="#f4f8f6" font-size="17" font-weight="700">Excel · Grafana</text>
    <text x="640" y="576" fill="#c3dcd1" font-size="16" fill-opacity="0.55">github.com/artur-bortsov/veeam-log-analyzer</text>
  </g>
</svg>
