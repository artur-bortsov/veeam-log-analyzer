      <text x="712" y="334" text-anchor="middle" fill="#c3dcd1" font-size="16">Replication</text>
      <text x="712" y="356" text-anchor="middle" fill="#c3dcd1" font-size="16">sessions</text>
    </g>
    <g>
      <rect x="814" y="225" width="132" height="150" rx="24" fill="#0f1c19" fill-opacity="0.92" stroke="#4cd97b" stroke-opacity="0.74" stroke-width="2" />
      <rect x="830" y="239" width="100" height="8" rx="4" fill="#4cd97b" />
      <circle cx="850" cy="257" r="10" fill="#4cd97b" fill-opacity="0.18" stroke="#4cd97b" />
      <text x="880" y="300" text-anchor="middle" fill="#f4f8f6" font-size="22" font-weight="700">Parser</text>
      <text x="880" y="334" text-anchor="middle" fill="#c3dcd1" font-size="16">Times, routes,</text>
      <text x="880" y="356" text-anchor="middle" fill="#c3dcd1" font-size="16">proxies</text>
    </g>
    <g>
      <rect x="982" y="225" width="132" height="150" rx="24" fill="#0f1c19" fill-opacity="0.92" stroke="#4dcde0" stroke-opacity="0.74" stroke-width="2" />
      <rect x="998" y="239" width="100" height="8" rx="4" fill="#4dcde0" />
      <circle cx="1018" cy="257" r="10" fill="#4dcde0" fill-opacity="0.18" stroke="#4dcde0" />
      <text x="1048" y="294" text-anchor="middle" fill="#f4f8f6" font-size="22" font-weight="700">CSV</text>
      <text x="1048" y="323" text-anchor="middle" fill="#c3dcd1" font-size="17">Excel</text>
      <text x="1048" y="341" text-anchor="middle" fill="#c3dcd1" font-size="17">Grafana</text>
      <text x="1048" y="359" text-anchor="middle" fill="#c3dcd1" font-size="17">+ more</text>
    </g>
    <g fill="none" stroke-linecap="round" stroke-width="6">
      <line x1="778" y1="300" x2="804" y2="300" stroke="#ffc45c" />
      <polygon points="804,300 790,292 790,308" fill="#ffc45c" stroke="none" />
      <line x1="946" y1="300" x2="972" y2="300" stroke="#4cd97b" />
      <polygon points="972,300 958,292 958,308" fill="#4cd97b" stroke="none" />
    </g>
    <text x="646" y="430" fill="#c3dcd1" font-size="18">Incremental runs skip known IDs and keep a cumulative CSV</text>
    <text x="646" y="454" fill="#c3dcd1" font-size="18">ready for dashboards and trend analysis.</text>
  </g>
