<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627" role="img" aria-labelledby="title desc">
  <title id="title">Veeam Replication Log Analyzer thumbnail</title>
  <desc id="desc">A thumbnail showing Veeam replication task logs flowing through a parser into a cumulative CSV dataset for analytics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1318" />
      <stop offset="100%" stop-color="#0a3b27" />
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="36" />
    </filter>
  </defs>
  <rect width="1200" height="627" fill="url(#bg)" />
  <ellipse cx="160" cy="120" rx="260" ry="180" fill="#4cd97b" fill-opacity="0.26" filter="url(#blur)" />
  <ellipse cx="960" cy="50" rx="190" ry="130" fill="#4dcde0" fill-opacity="0.16" filter="url(#blur)" />
  <ellipse cx="1010" cy="540" rx="270" ry="210" fill="#6ff3b3" fill-opacity="0.16" filter="url(#blur)" />
