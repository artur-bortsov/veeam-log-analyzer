    <line x1="1072" y1="74" x2="944" y2="560" />
    <line x1="1126" y1="74" x2="998" y2="560" />
  </g>
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <line x1="604" y1="120" x2="1150" y2="120" />
    <line x1="604" y1="178" x2="1150" y2="178" />
    <line x1="604" y1="236" x2="1150" y2="236" />
    <line x1="604" y1="294" x2="1150" y2="294" />
    <line x1="604" y1="352" x2="1150" y2="352" />
    <line x1="604" y1="410" x2="1150" y2="410" />
    <line x1="604" y1="468" x2="1150" y2="468" />
  </g>
  <g font-family="Inter, Arial, Helvetica, sans-serif">
    <rect x="72" y="68" width="228" height="40" rx="20" fill="#0a1715" fill-opacity="0.56" stroke="#ffffff" stroke-opacity="0.28" />
    <text x="186" y="94" text-anchor="middle" fill="#c3dcd1" font-size="19" font-weight="700">Veeam → Analytics</text>
    <text x="72" y="192" fill="#f4f8f6" font-size="74" font-weight="800">Veeam</text>
    <text x="72" y="274" fill="#f4f8f6" font-size="74" font-weight="800">Log</text>
    <text x="72" y="356" fill="#f4f8f6" font-size="74" font-weight="800">Analyzer</text>
    <rect x="72" y="388" width="160" height="8" rx="4" fill="#4cd97b" />
    <text x="72" y="450" fill="#f4f8f6" font-size="28" font-weight="600">Turn replication logs</text>
    <text x="72" y="484" fill="#f4f8f6" font-size="28" font-weight="600">into metrics you can chart.</text>
    <text x="72" y="532" fill="#c3dcd1" font-size="20">Parses Veeam replication sessions into a cumulative CSV.</text>
    <rect x="72" y="566" width="468" height="42" rx="20" fill="#0a1715" fill-opacity="0.56" stroke="#ffffff" stroke-opacity="0.28" />
    <text x="306" y="594" text-anchor="middle" fill="#f4f8f6" font-size="17" font-weight="700">Key fields: timing • storage • proxy • bottleneck</text>
    <rect x="610" y="92" width="540" height="440" rx="32" fill="#081210" fill-opacity="0.84" stroke="#5ab284" stroke-opacity="0.38" />
    <text x="646" y="146" fill="#f4f8f6" font-size="28" font-weight="700">How it works</text>
    <text x="646" y="176" fill="#c3dcd1" font-size="17">Reads Veeam replication task logs, extracts session</text>
    <text x="646" y="198" fill="#c3dcd1" font-size="17">details, and builds a reporting-ready dataset.</text>
    <g>
      <rect x="646" y="225" width="132" height="150" rx="24" fill="#0f1c19" fill-opacity="0.92" stroke="#ffc45c" stroke-opacity="0.74" stroke-width="2" />
